<!DOCTYPE html>
<html>
<head>
    <title>Not Medium Page.</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 200px;
            padding: 20px;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }

<body>
    <p>Oops! This isn't a page on the Medium platform, or they're using Medium with a custom domain.</p>
    <p>If you're sure this page is on the Medium platform, click the Continue button below to keep using the extension.</p>
    <button id="continueBtn">Continue</button>
    <script src="popup.js"></script>
</body>
</html>
