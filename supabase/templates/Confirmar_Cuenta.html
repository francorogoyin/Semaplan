<table width="100%" cellpadding="0" cellspacing="0"
  style="background:#f3efe7;padding:40px 0;
  font-family:'Space Grotesk','Segoe UI',
  sans-serif;">
  <tr><td align="center">
    <table width="420" cellpadding="0"
      cellspacing="0" style="background:#fbf7f0;
      border-radius:16px;padding:40px;
      border:1px solid #d9cfc0;">
      <tr><td align="center"
        style="padding-bottom:24px;">
        <img
          src="https://semaplan.com/Aplicaciones/Desktop/Semaplan.png"
          width="56" height="56" alt="Semaplan"
          style="display:block;margin:0 auto 12px;
          border:0;border-radius:12px;">
        <span style="font-size:28px;
          font-weight:700;color:#1f1f1f;">
          Semaplan
        </span>
      </td></tr>
      <tr><td style="color:#1f1f1f;
        font-size:16px;line-height:1.6;
        padding-bottom:8px;">
        Confirmá tu cuenta
      </td></tr>
      <tr><td style="color:#6a6257;
        font-size:14px;line-height:1.6;
        padding-bottom:24px;">
        Hacé clic en el botón para verificar
        tu email y activar tu cuenta.
      </td></tr>
      <tr><td align="center"
        style="padding-bottom:24px;">
        <a href="{{ .ConfirmationURL }}"
          style="display:inline-block;
          background:#0f5f5a;color:#fff;
          font-size:14px;font-weight:600;
          padding:12px 32px;
          border-radius:999px;
          text-decoration:none;">
          Confirmar email
        </a>
      </td></tr>
      <tr><td style="color:#6a6257;
        font-size:12px;line-height:1.5;
        border-top:1px solid #d9cfc0;
        padding-top:16px;">
        Si no creaste una cuenta en Semaplan,
        ignorá este mensaje.
      </td></tr>
    </table>
  </td></tr>
</table>
