<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Semaplan | Términos</title>
    <link
      rel="icon"
      type="image/png"
      href="Aplicaciones/Desktop/Semaplan.png"
    />
    <style>
      :root {
        --Tarjeta: rgba(255, 250, 242, 0.9);
        --Tinta: #1b251d;
        --Suave: #566457;
        --Marca: #196e58;
        --Marca_Fuerte: #0f5847;
        --Borde: rgba(27, 37, 29, 0.12);
        --Sombra: 0 18px 56px rgba(16, 34, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--Tinta);
        background:
          radial-gradient(
            circle at top left,
            rgba(25, 110, 88, 0.12),
            transparent 34%
          ),
          linear-gradient(180deg, #fbf6ee 0%, #f1e8d8 100%);
        font-family:
          "Aptos",
          "Segoe UI",
          "Trebuchet MS",
          sans-serif;
      }

      a {
        color: var(--Marca_Fuerte);
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .Pagina {
        width: min(100% - 24px, 920px);
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .Topbar,
      .Contenido {
        background: var(--Tarjeta);
        border: 1px solid var(--Borde);
        box-shadow: var(--Sombra);
      }

      .Topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 22px;
        border-radius: 26px;
      }

      .Brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
      }

      .Brand img {
        width: 38px;
        height: 38px;
        border-radius: 12px;
      }

      .Topbar_Acciones {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .Nav {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .Nav a {
        color: var(--Suave);
      }

      .Idioma_Switcher {
        display: inline-flex;
        gap: 8px;
        padding: 5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid var(--Borde);
      }

      .Idioma_Btn {
        border: 0;
        padding: 8px 12px;
        border-radius: 999px;
        color: var(--Suave);
        background: transparent;
        cursor: pointer;
      }

      .Idioma_Btn.Activo {
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--Marca) 0%,
          var(--Marca_Fuerte) 100%
        );
      }

      .Idioma_Flag {
        margin-right: 6px;
        font-family:
          "Segoe UI Emoji",
          "Apple Color Emoji",
          "Noto Color Emoji",
          "Segoe UI Symbol";
      }

      .Contenido {
        margin-top: 18px;
        padding: 30px;
        border-radius: 30px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 4vw, 3.2rem);
        line-height: 1;
      }

      h2 {
        margin: 28px 0 10px;
        font-size: 1.22rem;
      }

      p,
      li {
        color: var(--Suave);
        line-height: 1.72;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 20px;
      }

      .Meta {
        margin: 0;
        color: var(--Suave);
      }

      @media (max-width: 680px) {
        .Topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .Topbar_Acciones {
          justify-content: flex-start;
        }

        .Contenido {
          padding: 22px;
        }
      }
    </style>
  </head>

      function Normalizar_Idioma(Idioma) {
        return Idiomas_Publicos.includes(Idioma) ? Idioma : "es";
      }

      function Leer_Idioma_Publico() {
        const Url = new URL(window.location.href);
        const Query = Url.searchParams.get("lang");
        if (Idiomas_Publicos.includes(Query)) {
          return Query;
        }
        const Guardado = localStorage.getItem(
          Clave_Idioma_Publico
        );
        return Normalizar_Idioma(Guardado);
      }

      function Actualizar_Links(Idioma) {
        document
          .querySelectorAll(".Link_Pagina[data-link]")
          .forEach((Link) => {
            const Url = new URL(
              Link.dataset.link,
              window.location.href
            );
            Url.searchParams.set("lang", Idioma);
            Link.href = Url.pathname + Url.search;
          });
      }

      function Renderizar_Cuerpo(Idioma) {
        const Copia = Textos[Idioma];
        const Contenedor = document.getElementById("Cuerpo");
        Contenedor.innerHTML = "";

        const Intro = document.createElement("p");
        Intro.textContent = Copia.intro;
        Contenedor.appendChild(Intro);

        Copia.sections.forEach((Seccion) => {
          const Titulo = document.createElement("h2");
          Titulo.textContent = Seccion.title;
          Contenedor.appendChild(Titulo);

          (Seccion.paragraphs || []).forEach((Texto) => {
            const P = document.createElement("p");
            P.textContent = Texto;
            Contenedor.appendChild(P);
          });

          if (Seccion.list?.length) {
            const Lista = document.createElement("ul");
            Seccion.list.forEach((Item) => {
              const Li = document.createElement("li");
              Li.textContent = Item;
              Lista.appendChild(Li);
            });
            Contenedor.appendChild(Lista);
          }
        });
      }

      function Aplicar_Idioma(Idioma) {
        const Idioma_Activo = Normalizar_Idioma(Idioma);
        const Copia = Textos[Idioma_Activo];
        document.documentElement.lang = Idioma_Activo;
        document.title = Copia.title;
        document.getElementById("Titulo").textContent =
          Copia.heading;
        document.getElementById("Meta").textContent = Copia.meta;
        document
          .querySelectorAll("[data-i18n]")
          .forEach((Nodo) => {
            Nodo.textContent = Copia[Nodo.dataset.i18n];
          });
        document
          .querySelectorAll(".Idioma_Btn")
          .forEach((Btn) => {
            Btn.classList.toggle(
              "Activo",
              Btn.dataset.lang === Idioma_Activo
            );
          });
        Renderizar_Cuerpo(Idioma_Activo);
        localStorage.setItem(
          Clave_Idioma_Publico,
          Idioma_Activo
        );
        Actualizar_Links(Idioma_Activo);
        const Url = new URL(window.location.href);
        Url.searchParams.set("lang", Idioma_Activo);
        history.replaceState({}, "", Url.toString());
      }

      document
        .querySelectorAll(".Idioma_Btn")
        .forEach((Btn) => {
          Btn.addEventListener("click", () => {
            Aplicar_Idioma(Btn.dataset.lang);
          });
        });

      Aplicar_Idioma(Leer_Idioma_Publico());

  </body>
</html>
